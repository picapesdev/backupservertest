name: sync

permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: backup-sync
  cancel-in-progress: false

jobs:
  update-db-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: fetch sync
        shell: bash
        env:
          BACKUP_URL: ${{ secrets.BACKUP_URL }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          OUTPUT_FILE: "operations/db-sync.json"

        run: |
          set -Eeuo pipefail

          mkdir -p operations

          temp_file="$(mktemp)"
          headers_file="$(mktemp)"

          cleanup() {
            rm -f "$temp_file" "$headers_file"
          }

          trap cleanup EXIT

          echo "Fetching backup sync..."

          if [ -z "${BACKUP_URL:-}" ] || [ -z "${USER_AGENT:-}" ]; then
            echo "Missing required secrets"
            exit 1
          fi

          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 30 \
            -A "$USER_AGENT" \
            -H 'Accept: application/json' \
            -D "$headers_file" \
            -w '%{http_code}' \
            "$BACKUP_URL" \
            -o "$temp_file")

          echo "HTTP CODE: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Server returned HTTP $http_code"
            exit 0
          fi

          if [ ! -s "$temp_file" ]; then
            echo "Downloaded file is empty"
            exit 0
          fi

          python -m json.tool "$temp_file" > /dev/null

          if [ -f "$OUTPUT_FILE" ] && cmp -s "$OUTPUT_FILE" "$temp_file"; then
            echo "No changes detected."
            exit 0
          fi

          mv "$temp_file" "$OUTPUT_FILE"

      - name: Generate profile JSONs
        shell: bash
        run: |
          python << 'PY'
          import json
          import os
          import shutil

          DB_PATH = "operations/db-sync.json"
          PROFILE_DIR = "profile"

          CDN_SERVER_URL = "https://cdn.picapes.syanic.org"
          CAPE_SERVER_URL = "https://servers.picapes.syanic.org"

          if not os.path.exists(DB_PATH):
              raise SystemExit("db-sync.json missing")

          with open(DB_PATH, "r", encoding="utf-8") as f:
              data = json.load(f)

          if os.path.exists(PROFILE_DIR):
              shutil.rmtree(PROFILE_DIR)

          os.makedirs(PROFILE_DIR, exist_ok=True)

          generated = 0

          for ign, capeid in data.items():
              cape_source = "default"
              cape_identifier = str(capeid)

              if ":" in cape_identifier:
                  cape_source, cape_identifier = cape_identifier.split(":", 1)

              if cape_source == "default":
                  url = f"{CDN_SERVER_URL}/capes/{cape_identifier}.png"
                  player_data = {
                      "textureURL": url,
                      "staticURL": url,
                      "animatedCape": False
                  }

              elif cape_source == "animated":
                  player_data = {
                      "textureURL": f"{CDN_SERVER_URL}/animated_capes/sprites/{cape_identifier}.png",
                      "staticURL": f"{CDN_SERVER_URL}/animated_capes/frame/{cape_identifier}.png",
                      "animatedCape": True
                  }

              else:
                  url = f"{CAPE_SERVER_URL}/api/v1/{cape_source}/{cape_identifier}.png"
                  player_data = {
                      "textureURL": url,
                      "staticURL": url,
                      "animatedCape": False
                  }

              profile_path = os.path.join(PROFILE_DIR, ign)
              os.makedirs(profile_path, exist_ok=True)

              with open(os.path.join(profile_path, "index.json"), "w", encoding="utf-8") as out:
                  json.dump(player_data, out, separators=(",", ":"), ensure_ascii=False)

              generated += 1

          print(f"Generated {generated} profile JSON files")
          PY

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add operations/db-sync.json profile/

          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi

          timestamp=$(date -u +"%Y-%m-%d %H:%M:%SZ")

          git commit -m "BACKUP SYNC $timestamp"

          git push