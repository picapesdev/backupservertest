name: sync

permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: backup-sync
  cancel-in-progress: true

jobs:
  update-db-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: fetch sync
        shell: bash
        env:
          BACKUP_URL: ${{ secrets.BACKUP_URL }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          OUTPUT_FILE: "db-sync.json"

        run: |
          set -Eeuo pipefail

          temp_file="$(mktemp)"
          headers_file="$(mktemp)"

          cleanup() {
            rm -f "$temp_file" "$headers_file"
          }

          trap cleanup EXIT

          echo "Fetching backup sync..."

          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 30 \
            -A "$USER_AGENT" \
            -H 'Accept: application/json' \
            -D "$headers_file" \
            -w '%{http_code}' \
            "$BACKUP_URL" \
            -o "$temp_file")

          echo "HTTP CODE: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Server returned HTTP $http_code"
            exit 0
          fi

          if [ ! -s "$temp_file" ]; then
            echo "Downloaded file is empty"
            exit 0
          fi

          echo "Validating JSON..."

          jq empty "$temp_file"

          if [ -f "$OUTPUT_FILE" ] && cmp -s "$OUTPUT_FILE" "$temp_file"; then
            echo "No changes detected."
            exit 0
          fi

          mv "$temp_file" "$OUTPUT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi

          timestamp=$(date -u +"%Y-%m-%d %H:%M:%SZ")

          git commit -m "BACKUP SYNC $timestamp"

          git push